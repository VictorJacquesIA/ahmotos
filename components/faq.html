<!-- =============================================
     COMPONENTE: FAQ Accordion
     Uso: copiar o bloco .faq__item para adicionar novas perguntas
============================================= -->
<section class="faq-section" id="faq" aria-labelledby="faq-title">
  <div class="container">

    <header class="section-header fade-up">
      <span class="section-label">Dúvidas frequentes</span>
      <h2 class="section-title" id="faq-title">Perguntas Frequentes</h2>
    </header>

    <div class="faq" role="list">

      <!-- Item FAQ — duplicar este bloco para adicionar perguntas -->
      <div class="faq__item fade-up" role="listitem">
        <button class="faq__question" aria-expanded="false">
          <span>Título da pergunta aqui?</span>
          <i class="fa-solid fa-chevron-down faq__icon" aria-hidden="true"></i>
        </button>
        <div class="faq__answer" hidden>
          <p>Resposta detalhada da pergunta aqui.</p>
        </div>
      </div>

    </div>
  </div>
</section>
