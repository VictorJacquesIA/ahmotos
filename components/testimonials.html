<section class="testimonials" id="depoimentos" aria-labelledby="testimonials-title">
  <div class="container">

    <header class="section-header fade-up">
      <span class="section-label">Prova Social</span>
      <h2 class="section-title" id="testimonials-title">O Que Dizem os Pilotos</h2>
    </header>

    <div class="testimonials__grid">

      <!-- Card — duplicar este bloco para adicionar depoimentos -->
      <article class="testimonials__card fade-up">
        <div class="stars" aria-label="5 de 5 estrelas">
          <i class="fa-solid fa-star" aria-hidden="true"></i>
          <i class="fa-solid fa-star" aria-hidden="true"></i>
          <i class="fa-solid fa-star" aria-hidden="true"></i>
          <i class="fa-solid fa-star" aria-hidden="true"></i>
          <i class="fa-solid fa-star" aria-hidden="true"></i>
        </div>
        <blockquote>
          <p class="testimonials__quote">"Texto do depoimento aqui."</p>
        </blockquote>
        <footer>
          <cite class="testimonials__author">Nome do Cliente</cite>
          <p class="testimonials__meta">Modelo da Moto</p>
        </footer>
      </article>

    </div>
  </div>
</section>
